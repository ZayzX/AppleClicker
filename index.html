<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="pomme.png" type="image/x-icon">
    <title>AppleClicker</title>
</head>
<body>
    
    <div class="containersWrapper">
        <div class="clickerContainer">
            <p class="title">Clicker Section</p>
            <p id="CurrentApple">Current Apple: 0 🍎</p>
            <p id="totalApple">Total Apple: 0 🍎</p>
            <p id="bonusText" class="bonus-text"></p>
            <br>
            <div class="button-container">
                <button onclick="ClickApple()" class="main-button">
                    <img src="pomme.png" alt="Pomme 🍎" height="250" width="250">
                    <img id="goldenApple" src="golden_apple.png" alt="Golden Apple" class="golden-apple" style="display: none;">
                </button>
            </div>
            <div class="save-buttons-container">
                <button onclick="exportSave()" class="save-button">📥 Export</button>
                <button onclick="importSave()" class="save-button">📤 Import</button>
                <input type="file" id="fileInput" accept=".json" style="display: none;">
            </div>
        </div>
        <div class="buildingsContainer">
            <p class="title">Buildings</p>
            <div class="scrollBox" id="buildingsScrollBox"></div>
        </div>
        <div class="upgradeContainer">
            <p class="title">Upgrades</p>
            <div class="scrollBox" id="upgradesScrollBox"></div>
        </div>
    </div>
    
    <audio id="sound" src="UISoundClick.mp3"></audio>
    <script src="script.js"></script>
</body>
</html>
